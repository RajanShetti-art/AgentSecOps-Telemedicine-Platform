name: Falco Runtime Validation

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Namespace used for the runtime probe pod
        required: false
        default: devsecops
      probe_name:
        description: Name of the probe pod used to trigger Falco rules
        required: false
        default: falco-probe

jobs:
  falco-runtime-test:
    name: Falco runtime alerts
    runs-on: [self-hosted, linux, k8s-runner]
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl and helm
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Load kubeconfig
        shell: bash
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [ -n "${KUBE_CONFIG_B64:-}" ]; then
            printf '%s' "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          fi

          if [ ! -f "$HOME/.kube/config" ]; then
            echo "No kubeconfig found. Provide secrets.KUBE_CONFIG_B64 or preconfigure kubeconfig on the runner."
            exit 1
          fi

          kubectl config current-context
          kubectl cluster-info
          kubectl get nodes

      - name: Create devsecops namespace
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml

      - name: Add Falco Helm repo
        shell: bash
        run: |
          set -euo pipefail
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo update

      - name: Install Falco
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install falco falcosecurity/falco \
            --namespace falco \
            --create-namespace \
            -f k8s/observability/falco-values.yaml \
            --wait \
            --timeout 10m

      - name: Wait for Falco pod
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status ds/falco -n falco --timeout=10m
          kubectl get pods -n falco -o wide

      - name: Launch probe pod
        shell: bash
        env:
          PROBE_NAMESPACE: ${{ inputs.namespace }}
          PROBE_NAME: ${{ inputs.probe_name }}
        run: |
          set -euo pipefail
          kubectl -n "$PROBE_NAMESPACE" delete pod "$PROBE_NAME" --ignore-not-found=true
          kubectl -n "$PROBE_NAMESPACE" run "$PROBE_NAME" --image=busybox:1.36 --restart=Never --command -- sh -c "sleep 3600"
          kubectl -n "$PROBE_NAMESPACE" wait --for=condition=Ready pod/"$PROBE_NAME" --timeout=120s

      - name: Trigger Falco rules
        shell: bash
        env:
          PROBE_NAMESPACE: ${{ inputs.namespace }}
          PROBE_NAME: ${{ inputs.probe_name }}
        run: |
          set -euo pipefail
          kubectl -n "$PROBE_NAMESPACE" exec "$PROBE_NAME" -- sh -c 'cat /etc/passwd >/dev/null'
          kubectl -n "$PROBE_NAMESPACE" exec "$PROBE_NAME" -- sh -c 'sh -c "id"'

      - name: Collect Falco logs
        shell: bash
        run: |
          set -euo pipefail
          falco_pod="$(kubectl get pods -n falco -o jsonpath='{.items[0].metadata.name}')"
          kubectl logs -n falco "$falco_pod" --since=10m --tail=500 | tee falco-runtime-logs.txt

      - name: Verify Falco alerts
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -Eq 'Unauthorized Shell Execution in Container|Suspicious /etc/passwd Access in Container' falco-runtime-logs.txt; then
            echo "Falco runtime alerts were not observed. Check the Falco pod logs and cluster runtime configuration."
            exit 1
          fi

      - name: Upload Falco logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: falco-runtime-logs
          path: falco-runtime-logs.txt

      - name: Cleanup probe pod
        if: always()
        shell: bash
        env:
          PROBE_NAMESPACE: ${{ inputs.namespace }}
          PROBE_NAME: ${{ inputs.probe_name }}
        run: |
          kubectl -n "$PROBE_NAMESPACE" delete pod "$PROBE_NAME" --ignore-not-found=true
