# Sensitive runtime values; use External Secrets or sealed-secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: telemedicine-secrets
  namespace: devsecops
  labels:
    app.kubernetes.io/part-of: telemedicine-platform
type: Opaque
stringData:
  # JWT signing material. REPLACE these values with secrets managed in a vault or sealed-secrets.
  JWT_SECRET: REPLACE_ME_jwt_secret
  SECRET_KEY: REPLACE_ME_app_secret_key

  # Database credentials for each microservice. Replace with secure values or mount from ExternalSecrets.
  AUTH_DB_USER: auth_user
  AUTH_DB_PASSWORD: REPLACE_ME_auth_db_password

  PATIENT_DB_USER: patient_user
  PATIENT_DB_PASSWORD: REPLACE_ME_patient_db_password

  APPOINTMENT_DB_USER: appointment_user
  APPOINTMENT_DB_PASSWORD: REPLACE_ME_appointment_db_password
