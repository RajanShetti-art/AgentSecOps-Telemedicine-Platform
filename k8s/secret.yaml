# Sensitive runtime values; use External Secrets or sealed-secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: telemedicine-secrets
  namespace: devsecops
  labels:
    app.kubernetes.io/part-of: telemedicine-platform
type: Opaque
stringData:
  # JWT signing material.
  JWT_SECRET: change-me-jwt-secret
  SECRET_KEY: change-me-app-secret-key

  # Database credentials for each microservice.
  AUTH_DB_USER: auth_user
  AUTH_DB_PASSWORD: change-auth-db-password

  PATIENT_DB_USER: patient_user
  PATIENT_DB_PASSWORD: change-patient-db-password

  APPOINTMENT_DB_USER: appointment_user
  APPOINTMENT_DB_PASSWORD: change-appointment-db-password
