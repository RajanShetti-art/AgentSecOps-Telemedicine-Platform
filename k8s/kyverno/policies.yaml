# ClusterPolicy 1: Disallow root containers in devsecops namespace.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-containers
  annotations:
    policies.kyverno.io/title: Disallow Root Containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-non-root-pod-and-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - devsecops
      validate:
        message: "Pods and containers in devsecops must run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            containers:
              - securityContext:
                  runAsNonRoot: true
            =(initContainers):
              - securityContext:
                  runAsNonRoot: true
---
# ClusterPolicy 2: Enforce Cosign signature verification.
# Replace public key with your real Cosign public key.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-signed-images-cosign
  annotations:
    policies.kyverno.io/title: Verify Signed Images
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: require-cosign-signatures
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - devsecops
      verifyImages:
        - imageReferences:
            - "*"
          mutateDigest: false
          required: true
          verifyDigest: true
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      REPLACE_WITH_YOUR_COSIGN_PUBLIC_KEY
                      -----END PUBLIC KEY-----
---
# ClusterPolicy 3: Enforce CPU and memory limits on all containers.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-resource-limits
  annotations:
    policies.kyverno.io/title: Enforce Resource Limits
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-limits-on-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - devsecops
      validate:
        message: "All containers must define CPU and memory limits."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
            =(initContainers):
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
---
# ClusterPolicy 4: Restrict privileged containers.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - devsecops
      validate:
        message: "Privileged containers are not allowed in devsecops."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].securityContext.privileged || `[]` }}"
                operator: AnyIn
                value:
                  - true
              - key: "{{ request.object.spec.initContainers[].securityContext.privileged || `[]` }}"
                operator: AnyIn
                value:
                  - true
