# Auth service deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: devsecops
  labels:
    app: auth-service
    app.kubernetes.io/part-of: telemedicine-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/component: backend
    spec:
      restartPolicy: Always
      containers:
        - name: auth-service
          # Replace with your registry image for cluster use.
          image: rajanshettiart/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # Secret and JWT settings.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: JWT_SECRET
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SECRET_KEY
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: JWT_ALGORITHM
            - name: JWT_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: JWT_EXPIRE_MINUTES

            # DB pieces from ConfigMap + Secret.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: AUTH_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: AUTH_DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: AUTH_DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: AUTH_DB_NAME

            # Required application-level env vars.
            - name: DATABASE_URL
              value: postgresql+psycopg2://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# Internal ClusterIP service for auth-service.
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: devsecops
  labels:
    app: auth-service
    app.kubernetes.io/part-of: telemedicine-platform
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
