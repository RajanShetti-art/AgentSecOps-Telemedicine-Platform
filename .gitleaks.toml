title = "Project-specific Gitleaks config"

[extend]
useDefault = true

[[rules]]
description = "Generic API keys and tokens"
id = "generic-api-keys-and-tokens"
regex = '''(?i)(?:api(?:_?key)|token|secret)[\s:=]+["']?[0-9A-Za-z\-_=]{20,}["']?'''
tags = ["api", "key", "secret"]

[allowlist]
description = "Allow non-sensitive placeholders and demo scan payloads"
paths = [
  '''^\.env\.example$''',
  '''^\.env$''',
  '''^devsecops-agent/sample-scan-results\.json$'''
]
regexes = [
  '''REPLACE_ME_jwt_secret''',
  '''REPLACE_ME_auth_db_password''',
  '''REPLACE_ME_patient_db_password''',
  '''REPLACE_ME_appointment_db_password''',
  '''Hardcoded API key detected'''
]
